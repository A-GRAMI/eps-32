<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ESP32 Control Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --text: #e8e8f0;
      --text-secondary: #8888a0;
      --border: #2a2a3e;
      --shadow: rgba(0,0,0,0.5);
      --input-bg: #222238;
      --accent: #4dabf7;
      --accent-glow: rgba(77,171,247,0.25);
      --green: #51cf66;
      --green-glow: rgba(81,207,102,0.25);
      --red: #ff6b6b;
      --red-glow: rgba(255,107,107,0.2);
    }
    body.light-mode {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b6b80;
      --border: #e0e0e8;
      --shadow: rgba(0,0,0,0.06);
      --input-bg: #f8f9fa;
      --accent: #228be6;
      --accent-glow: rgba(34,139,230,0.15);
      --green: #2f9e44;
      --green-glow: rgba(47,158,68,0.15);
      --red: #e03131;
      --red-glow: rgba(224,49,49,0.1);
    }
    * { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      text-align: center;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0 12px 70px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(77,171,247,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(81,207,102,0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(255,107,107,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    #dashboard { display: none; position: relative; z-index: 1; }
    #loginForm { position: relative; z-index: 1; }

    .header {
      position: relative;
      z-index: 1;
      padding: 28px 0 10px;
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #748ffc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .header .subtitle {
      margin: 4px 0 0;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .header .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green-glow); }
      50% { opacity: 0.5; box-shadow: 0 0 2px var(--green-glow); }
    }

    .section-title {
      font-size: 0.85rem;
      margin: 28px auto 14px;
      color: var(--text-secondary);
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      max-width: 960px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-title::before,
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: var(--card-bg);
      padding: 22px 16px 18px;
      margin: 8px;
      border-radius: 22px;
      box-shadow: 0 4px 20px var(--shadow);
      width: 200px;
      vertical-align: top;
      border: 1px solid var(--border);
      animation: card-enter 0.5s ease-out backwards;
      transition: transform 0.3s cubic-bezier(.2,0,0,1), box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px var(--shadow);
    }
    .card h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .card .status {
      font-size: 0.75rem;
      font-weight: 600;
      margin: 0 0 14px;
      padding: 5px 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 20px;
      background: rgba(128,128,160,0.08);
      transition: background 0.3s;
    }
    .card .status .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .card .status .dot.on {
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
    }
    .card button {
      padding: 11px 14px;
      border: none;
      border-radius: 14px;
      color: white;
      background: linear-gradient(135deg, var(--accent), #5c7cfa);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      width: 100%;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .card button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }
    .card button:hover::after { transform: translateX(100%); }
    .card button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    .card button:active { transform: translateY(0) scale(0.98); }

    .card .color-picker-wrap {
      position: relative;
      width: 60px; height: 60px;
      margin: 4px auto 8px;
    }
    .card .color-picker-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--border);
      z-index: 0;
    }
    .card input[type="color"] {
      position: relative;
      z-index: 1;
      width: 50px; height: 50px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
    }
    .card input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .card input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

    .card input[type="range"] {
      width: 100%;
      margin: 4px 0 6px;
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
    }
    .card input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #5c7cfa);
      cursor: pointer;
      box-shadow: 0 2px 12px var(--accent-glow);
      border: 2px solid var(--card-bg);
      transition: transform 0.2s;
    }
    .card input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    .card input[type="range"]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--card-bg);
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .brightness-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-top: 2px;
    }
    .color-label {
      display: block;
      margin-top: 6px;
      font-size: 0.65rem;
      color: var(--text-secondary);
      word-break: break-all;
      font-family: 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
      background: rgba(128,128,160,0.06);
      padding: 3px 8px;
      border-radius: 8px;
      letter-spacing: 0.2px;
    }

    .bottom-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      max-width: 520px;
      margin: 32px auto 12px;
    }
    #allOffBtn, #logoutBtn {
      padding: 14px 28px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: white;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.3s;
      flex: 1;
      min-width: 130px;
      max-width: 260px;
      position: relative;
      overflow: hidden;
    }
    #allOffBtn {
      background: linear-gradient(135deg, var(--red), #c92a2a);
    }
    #allOffBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--red-glow);
    }
    #logoutBtn {
      background: linear-gradient(135deg, #555, #333);
    }
    #logoutBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }
    #allOffBtn:active, #logoutBtn:active { transform: translateY(0) scale(0.97); }

    #darkModeBtn {
      position: fixed;
      bottom: 22px;
      right: 22px;
      padding: 12px 18px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: var(--card-bg);
      color: var(--text);
      box-shadow: 0 4px 24px var(--shadow);
      z-index: 100;
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.25s, box-shadow 0.3s;
      letter-spacing: 0.3px;
    }
    #darkModeBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow); }

    /* Login form */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(1.15); opacity: 0; }
    }
    #loginForm {
      max-width: 400px;
      margin: 80px auto 20px;
      background: var(--card-bg);
      padding: 48px 32px 32px;
      border-radius: 24px;
      box-shadow: 0 25px 60px var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      animation: fadeUp 0.6s ease-out;
    }
    #loginForm::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    #loginForm .login-icon {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #5c7cfa);
      margin: -82px auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      box-shadow: 0 8px 25px var(--accent-glow);
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    #loginForm .login-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: pulse-ring 2s ease-out infinite;
    }
    #loginForm h2 {
      margin: 0 0 4px;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    #loginForm p {
      margin: 0 0 28px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    #loginForm .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    #loginForm .input-group label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    #loginForm .input-wrapper { position: relative; }
    #loginForm .input-wrapper .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #loginForm .input-wrapper:focus-within .input-icon { opacity: 0.7; }
    #loginForm input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      font-size: 0.95rem;
      border: 2px solid var(--border);
      border-radius: 14px;
      box-sizing: border-box;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #loginForm input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    #loginForm input::placeholder { color: var(--text-secondary); opacity: 0.4; }
    #loginForm button {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #5c7cfa);
      background-size: 200% auto;
      color: white;
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.3s;
      margin-top: 6px;
      animation: shimmer 3s ease infinite;
      position: relative;
      overflow: hidden;
    }
    #loginForm button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }
    #loginForm button:active { transform: translateY(0); }

    .container {
      max-width: 1100px;
      margin: 14px auto 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2px;
    }

    @media (max-width: 900px) {
      .card { width: calc(50% - 20px); margin: 6px; }
    }
    @media (max-width: 600px) {
      body { padding: 0 10px 80px; }
      .header { padding: 20px 0 6px; }
      .header h1 { font-size: 1.25rem; }
      .card {
        width: 100%; margin: 6px 0;
        border-radius: 18px; padding: 18px 14px 16px;
      }
      .card h3 { font-size: 0.9rem; }
      .card button { padding: 13px 14px; font-size: 13px; }
      .card input[type="color"] { width: 54px; height: 54px; }
      .card .color-picker-wrap { width: 54px; height: 54px; }
      .section-title { font-size: 0.75rem; margin: 20px auto 10px; }
      .bottom-actions { flex-direction: column; align-items: center; gap: 10px; }
      #allOffBtn, #logoutBtn { max-width: 100%; width: 100%; padding: 15px; font-size: 14px; }
      #darkModeBtn { bottom: 14px; right: 14px; padding: 11px 16px; font-size: 11px; }
      .container { margin: 8px auto 0; }
      #loginForm { margin: 36px 12px 16px; padding: 40px 18px 24px; }
      #loginForm .login-icon { width: 56px; height: 56px; margin: -68px auto 16px; font-size: 24px; }
      #loginForm h2 { font-size: 1.2rem; }
      #loginForm input { padding: 12px 12px 12px 38px; font-size: 16px; }
      #loginForm button { padding: 13px; font-size: 14px; }
    }
    @media (max-width: 400px) {
      .card { padding: 14px 10px; border-radius: 14px; }
      .card button { font-size: 12px; padding: 12px 10px; }
      .header h1 { font-size: 1.05rem; }
    }
    @media (max-height: 500px) and (orientation: landscape) {
      #loginForm { margin: 12px auto; padding: 22px 20px; }
      #loginForm .login-icon { width: 44px; height: 44px; margin: -52px auto 10px; font-size: 18px; }
      #loginForm h2 { font-size: 0.95rem; }
      #loginForm .input-group { margin-bottom: 10px; }
      #loginForm input { padding: 9px 10px 9px 34px; font-size: 13px; }
      #loginForm button { padding: 9px; font-size: 12px; }
    }
    footer {
      font-size: 0.75rem;
      color: var(--text-secondary);
      padding: 14px 0 6px;
      margin-top: 40px;
      opacity: 0.4;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body class="dark-mode">

  <div class="header">
    <h1>ESP32 Dashboard</h1>
    <p class="subtitle"><span class="status-dot"></span>Smart Home Control</p>
  </div>

  <button id="darkModeBtn">☾ Light</button>

  <!-- Login form -->
  <div id="loginForm">
    <div class="login-icon">⚡</div>
    <h2>ESP Control</h2>
    <p>Sign in to access your dashboard</p>
    <div class="input-group">
      <label for="email">Email</label>
      <div class="input-wrapper">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔑</span>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>
    </div>
    <button id="loginBtn">Sign In</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="section-title">Light</div>
    <div class="container" id="topContainer"></div>

    <div class="section-title">Window</div>
    <div class="container" id="pushContainer"></div>

    <div class="section-title">Socket</div>
    <div class="container" id="middleContainer"></div>

    <div class="section-title">PC</div>
    <div class="container" id="pulseContainer"></div>

    <div class="section-title">Light Bar</div>
    <div class="container" id="colorContainer"></div>

    <div class="section-title">Light Bar TV</div>
    <div class="container" id="brightnessContainer"></div>

    <div class="bottom-actions">
      <button id="allOffBtn">All OFF</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <footer>Created by A.GRAMI</footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBP0osYBMwJUUjL9FaKaw-k_omD65g_Q_4",
      authDomain: "esp-32-9e51b.firebaseapp.com",
      databaseURL: "https://esp-32-9e51b-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "esp-32-9e51b",
      storageBucket: "esp-32-9e51b.firebasestorage.app",
      messagingSenderId: "452464470286",
      appId: "1:452464470286:web:dd5de435c39f1856c50f5f"
    };

    firebase.initializeApp(firebaseConfig);

    const allowedEmail = "admin@gmail.com";
    const allowedPassword = "admin123";

    const loginForm = document.getElementById("loginForm");
    const dashboard = document.getElementById("dashboard");
    const loginBtn = document.getElementById("loginBtn");
    const darkModeBtn = document.getElementById("darkModeBtn");

    // Dark mode toggle (default is dark)
    darkModeBtn.addEventListener("click", () => {
      document.body.classList.toggle("light-mode");
      darkModeBtn.textContent = document.body.classList.contains("light-mode") ? "☀ Dark Mode" : "☾ Light Mode";
    });

    loginBtn.addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Please enter email and password.");
        return;
      }

      if (email === allowedEmail && password === allowedPassword) {
        firebase.auth().signInWithEmailAndPassword(email, password)
          .then(() => {
            loginForm.style.display = "none";
            dashboard.style.display = "block";
            startDashboard();
          })
          .catch(error => {
            alert("Firebase login failed: " + error.message);
          });
      } else {
        alert("Invalid email or password.");
      }
    });

    document.getElementById("logoutBtn").onclick = () => {
      firebase.auth().signOut()
        .then(() => {
          dashboard.style.display = "none";
          loginForm.style.display = "block";
          document.getElementById("email").value = "";
          document.getElementById("password").value = "";
        })
        .catch(error => alert("Logout failed: " + error.message));
    };

    function setStatusEl(statusId, on) {
      const el = document.getElementById(statusId);
      const dot = document.getElementById("dot" + statusId);
      if (el) el.innerText = on ? "ON" : "OFF";
      if (dot) dot.className = "dot" + (on ? " on" : "");
    }

    function createCard(title, statusId, btnId, extra) {
      const div = document.createElement("div");
      div.className = "card";
      let html = `<h3>${title}</h3><span class="status"><span class="dot" id="dot${statusId}"></span><span id="${statusId}">Loading...</span></span>`;
      if (btnId) html += `<button id="${btnId}">${extra || "Toggle"}</button>`;
      else if (extra) html += extra;
      div.innerHTML = html;
      return div;
    }

    function hexToRgbStr(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `R${r},G${g},B${b}`;
    }

    function startDashboard() {
      const db = firebase.database();

      // ---- Top Section: Light ----
      const lightData = [
        { id: 1, path: "relay1", name: "Light" },
      ];
      const topContainer = document.getElementById("topContainer");

      lightData.forEach(r => {
        const statusId = "tStatus" + r.id;
        const btnId = "tBtn" + r.id;
        const card = createCard(r.name, statusId, btnId, "Toggle");
        topContainer.appendChild(card);

        const statusEl = document.getElementById(statusId);
        const btn = document.getElementById(btnId);
        const ref = db.ref("/" + r.path);

        ref.on("value", snap => {
          const v = snap.val();
          setStatusEl(statusId, v);
          btn.style.backgroundColor = v ? "green" : "var(--accent)";
        });

        btn.onclick = () => {
          ref.get().then(snap => ref.set(!snap.val()));
        };
      });

      // ---- Middle Section: Sockets ----
      const socketData = [
        { id: 2, path: "relay2", name: "Socket 1" },
        { id: 3, path: "relay3", name: "Socket 2" },
        { id: 4, path: "relay4", name: "Socket PC" },
        { id: 5, path: "relay5", name: "Socket TV" },
      ];
      const middleContainer = document.getElementById("middleContainer");

      socketData.forEach(r => {
        const statusId = "mStatus" + r.id;
        const btnId = "mBtn" + r.id;
        const card = createCard(r.name, statusId, btnId, "Toggle");
        middleContainer.appendChild(card);

        const statusEl = document.getElementById(statusId);
        const btn = document.getElementById(btnId);
        const ref = db.ref("/" + r.path);

        ref.on("value", snap => {
          const v = snap.val();
          setStatusEl(statusId, v);
          btn.style.backgroundColor = v ? "green" : "var(--accent)";
        });

        btn.onclick = () => {
          ref.get().then(snap => ref.set(!snap.val()));
        };
      });

      // ---- 2 Push Buttons ----
      const pushData = [
        { id: 1, path: "relay6", name: "Up" },
        { id: 2, path: "relay7", name: "Down" },
      ];
      const pushContainer = document.getElementById("pushContainer");

      pushData.forEach(r => {
        const statusId = "pStatus" + r.id;
        const btnId = "pBtn" + r.id;
        const card = createCard(r.name, statusId, btnId, "Hold");
        pushContainer.appendChild(card);

        const statusEl = document.getElementById(statusId);
        const btn = document.getElementById(btnId);
        const ref = db.ref("/" + r.path);

        ref.on("value", snap => {
          const v = snap.val();
          setStatusEl(statusId, v);
          btn.style.backgroundColor = v ? "green" : "var(--accent)";
        });

        const set = (val) => ref.set(val);
        btn.onmousedown = () => set(true);
        btn.onmouseup = () => set(false);
        btn.onmouseleave = () => set(false);
        btn.ontouchstart = (e) => { e.preventDefault(); set(true); };
        btn.ontouchend = (e) => { e.preventDefault(); set(false); };
        btn.ontouchcancel = () => set(false);
      });

      // ---- 1 Pulse Button ----
      const pulseContainer = document.getElementById("pulseContainer");
      const pulseCard = createCard("Power PC", "pulseStatus", "pulseBtn", "ON / OFF");
      pulseContainer.appendChild(pulseCard);

      const pulseStatus = document.getElementById("pulseStatus");
      const pulseBtn = document.getElementById("pulseBtn");
      const pulseRef = db.ref("/relay8");

      pulseRef.on("value", snap => {
        setStatusEl("pulseStatus", snap.val());
        pulseBtn.style.backgroundColor = snap.val() ? "green" : "var(--accent)";
      });

      pulseBtn.onclick = () => {
        pulseRef.set(true);
        setTimeout(() => pulseRef.set(false), 500);
      };

      // ---- 2 Color Pickers ----
      const colorData = [
        { id: 1, path: "color1", name: "Light Bar 1" },
        { id: 2, path: "color2", name: "Light Bar 2" },
      ];
      const colorContainer = document.getElementById("colorContainer");

      colorData.forEach(c => {
        const statusId = "cStatus" + c.id;
        const labelId = "cLabel" + c.id;
        const pickerId = "cPicker" + c.id;
        const toggleBtnId = "cToggle" + c.id;
        let lastColor = "#ff0000";
        const card = createCard(c.name, statusId, null,
          `<input type="color" id="${pickerId}" value="#ff0000" />
           <span class="color-label" id="${labelId}">R255,G0,B0</span>
           <button id="${toggleBtnId}" style="margin-top:10px">Toggle</button>`
        );
        colorContainer.appendChild(card);

        const statusEl = document.getElementById(statusId);
        const picker = document.getElementById(pickerId);
        const label = document.getElementById(labelId);
        const toggleBtn = document.getElementById(toggleBtnId);
        const colorRef = db.ref("/" + c.path);

        function updateStatus(rgb) {
          const isOff = rgb === "R0,G0,B0";
          setStatusEl(statusId, !isOff);
          toggleBtn.style.backgroundColor = isOff ? "var(--accent)" : "green";
        }

        colorRef.on("value", snap => {
          const v = snap.val() || "R0,G0,B0";
          label.innerText = v;
          updateStatus(v);
        });

        picker.addEventListener("input", () => {
          lastColor = picker.value;
          const rgb = hexToRgbStr(picker.value);
          label.innerText = rgb;
          colorRef.set(rgb);
        });

        toggleBtn.onclick = () => {
          colorRef.get().then(snap => {
            const cur = snap.val() || "R0,G0,B0";
            if (cur === "R0,G0,B0") {
              picker.value = lastColor;
              const rgb = hexToRgbStr(lastColor);
              label.innerText = rgb;
              colorRef.set(rgb);
            } else {
              colorRef.set("R0,G0,B0");
              label.innerText = "R0,G0,B0";
            }
          });
        };

        colorRef.once("value", snap => {
          const existing = snap.val();
          if (existing) {
            const parts = existing.match(/R(\d+),G(\d+),B(\d+)/);
            if (parts) {
              const toHex = v => parseInt(v).toString(16).padStart(2, "0");
              const hex = "#" + toHex(parts[1]) + toHex(parts[2]) + toHex(parts[3]);
              picker.value = hex;
              lastColor = hex;
            }
            label.innerText = existing;
            updateStatus(existing);
          } else {
            const rgb = hexToRgbStr(picker.value);
            label.innerText = rgb;
            colorRef.set(rgb);
          }
        });
      });

      // ---- Brightness Slider ----
      const brightnessContainer = document.getElementById("brightnessContainer");
      const brightId = "brightnessSlider";
      const brightValId = "brightVal";
      const brightStatusId = "brightStatus";
      const brightCard = createCard("Light Bar TV", brightStatusId, null,
        `<input type="range" id="${brightId}" min="0" max="100" value="0" />
         <div class="brightness-value" id="${brightValId}">0%</div>`
      );
      brightnessContainer.appendChild(brightCard);

      const brightStatus = document.getElementById(brightStatusId);
      const brightSlider = document.getElementById(brightId);
      const brightVal = document.getElementById(brightValId);
      const brightRef = db.ref("/brightness");

      brightRef.on("value", snap => {
        const v = snap.val();
        const val = v != null ? v : 0;
        brightSlider.value = val;
        brightVal.innerText = val + "%";
        brightStatus.innerText = val + "%";
      });

      brightSlider.addEventListener("input", () => {
        const val = parseInt(brightSlider.value);
        brightVal.innerText = val + "%";
        brightRef.set(val);
      });

      // ---- All OFF ----
      document.getElementById("allOffBtn").onclick = () => {
        [...lightData, ...socketData, ...pushData].forEach(r => {
          db.ref("/" + r.path).set(false);
        });
        db.ref("/relay8").set(false);
        db.ref("/color1").set("R0,G0,B0");
        db.ref("/color2").set("R0,G0,B0");
        db.ref("/brightness").set(0);
      };
    }
  </script>
</body>
</html>
