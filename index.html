<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ESP32 Smart Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b0b1a;
      --card-bg: rgba(26, 26, 46, 0.75);
      --text: #e8e8f0;
      --text-secondary: #8888a0;
      --border: rgba(255,255,255,0.06);
      --shadow: rgba(0,0,0,0.5);
      --input-bg: rgba(34, 34, 56, 0.8);
      --accent: #4dabf7;
      --accent-glow: rgba(77,171,247,0.3);
      --green: #51cf66;
      --green-glow: rgba(81,207,102,0.3);
      --red: #ff6b6b;
      --red-glow: rgba(255,107,107,0.25);
      --glass-edge: rgba(255,255,255,0.04);
      --card-radius: 20px;
    }
    body.light-mode {
      --bg: #eef0f4;
      --card-bg: rgba(255, 255, 255, 0.82);
      --text: #1a1a2e;
      --text-secondary: #6b6b80;
      --border: rgba(0,0,0,0.06);
      --shadow: rgba(0,0,0,0.06);
      --input-bg: rgba(248, 249, 250, 0.9);
      --accent: #228be6;
      --accent-glow: rgba(34,139,230,0.18);
      --green: #2f9e44;
      --green-glow: rgba(47,158,68,0.18);
      --red: #e03131;
      --red-glow: rgba(224,49,49,0.12);
      --glass-edge: rgba(0,0,0,0.04);
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,160,0.3); border-radius: 3px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      text-align: center;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0 12px 80px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background 0.5s, color 0.5s;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(77,171,247,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(81,207,102,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(255,107,107,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: bgShift 15s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-2%, -1%); }
    }

    #dashboard { display: none; position: relative; z-index: 1; }
    #loginForm { position: relative; z-index: 1; }

    /* Toast */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 14px 22px;
      border-radius: 14px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px var(--shadow);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn 0.35s cubic-bezier(.2,0,0,1) forwards;
      max-width: 360px;
    }
    .toast.removing { animation: toastOut 0.3s cubic-bezier(.5,0,0,1) forwards; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(60px) scale(0.92); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to { opacity: 0; transform: translateX(60px) scale(0.92); }
    }
    .toast .toast-icon { font-size: 1.2rem; }
    .toast.error { border-left: 3px solid var(--red); }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.info { border-left: 3px solid var(--accent); }

    .header {
      position: relative;
      z-index: 1;
      padding: 28px 0 10px;
      transition: opacity 0.4s;
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #748ffc, #845ef7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      background-size: 200% auto;
      animation: gradShift 4s ease-in-out infinite alternate;
    }
    @keyframes gradShift {
      0% { background-position: 0% center; }
      100% { background-position: 100% center; }
    }
    .header .subtitle {
      margin: 4px 0 0;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .header .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 8px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(128,128,160,0.08);
      transition: background 0.4s, color 0.4s;
    }
    .status-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-badge.online .dot { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
    .status-badge.offline .dot { background: var(--red); box-shadow: 0 0 8px var(--red-glow); }

    .section-title {
      font-size: 0.8rem;
      margin: 28px auto 14px;
      color: var(--text-secondary);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      max-width: 960px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-title::before,
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(24px) scale(0.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 22px 16px 18px;
      margin: 8px;
      border-radius: var(--card-radius);
      box-shadow: 0 8px 32px var(--shadow);
      width: 200px;
      vertical-align: top;
      border: 1px solid var(--glass-edge);
      animation: cardEnter 0.5s cubic-bezier(.2,0,0,1) backwards;
      transition: transform 0.35s cubic-bezier(.2,0,0,1), box-shadow 0.35s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.25;
      transition: opacity 0.3s;
    }
    .card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow: 0 16px 48px var(--shadow);
      border-color: rgba(128,128,160,0.12);
    }
    .card:hover::before { opacity: 0.5; }
    .card h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .card .status {
      font-size: 0.75rem;
      font-weight: 600;
      margin: 0 0 14px;
      padding: 5px 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 20px;
      background: rgba(128,128,160,0.06);
      transition: background 0.3s;
    }
    .card .status .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .card .status .dot.on {
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
    }
    .card button {
      padding: 11px 14px;
      border: none;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, var(--accent), #5c7cfa);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      width: 100%;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.3s, opacity 0.3s;
      position: relative;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .card button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .card button:hover::after { transform: translateX(100%); }
    .card button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    .card button:active { transform: translateY(0) scale(0.97); }

    .card .color-picker-wrap {
      position: relative;
      width: 60px; height: 60px;
      margin: 4px auto 8px;
    }
    .card .color-picker-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--border);
      z-index: 0;
    }
    .card input[type="color"] {
      position: relative;
      z-index: 1;
      width: 50px; height: 50px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
    }
    .card input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .card input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

    .card input[type="range"] {
      width: 100%;
      margin: 4px 0 6px;
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
    }
    .card input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #5c7cfa);
      cursor: pointer;
      box-shadow: 0 2px 12px var(--accent-glow);
      border: 2px solid rgba(255,255,255,0.1);
      transition: transform 0.2s;
    }
    .card input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    .card input[type="range"]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .brightness-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-top: 2px;
    }
    .color-label {
      display: block;
      margin-top: 6px;
      font-size: 0.65rem;
      color: var(--text-secondary);
      word-break: break-all;
      font-family: 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
      background: rgba(128,128,160,0.06);
      padding: 3px 8px;
      border-radius: 8px;
      letter-spacing: 0.2px;
    }

    .bottom-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      max-width: 520px;
      margin: 32px auto 12px;
    }
    #allOffBtn, #logoutBtn {
      padding: 14px 28px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.3s;
      flex: 1;
      min-width: 130px;
      max-width: 260px;
      position: relative;
      overflow: hidden;
    }
    #allOffBtn {
      background: linear-gradient(135deg, var(--red), #c92a2a);
    }
    #allOffBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--red-glow);
    }
    #logoutBtn {
      background: linear-gradient(135deg, #555, #333);
    }
    #logoutBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }
    #allOffBtn:active, #logoutBtn:active { transform: translateY(0) scale(0.97); }

    #darkModeBtn {
      position: fixed;
      bottom: 22px;
      right: 22px;
      padding: 12px 18px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--text);
      box-shadow: 0 4px 24px var(--shadow);
      z-index: 100;
      border: 1px solid var(--glass-edge);
      transition: transform 0.25s, box-shadow 0.3s;
      letter-spacing: 0.3px;
    }
    #darkModeBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow); }

    /* Login form */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(1.15); opacity: 0; }
    }
    #loginForm {
      max-width: 400px;
      margin: 80px auto 20px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 48px 32px 32px;
      border-radius: 24px;
      box-shadow: 0 25px 60px var(--shadow);
      border: 1px solid var(--glass-edge);
      position: relative;
      animation: fadeUp 0.6s cubic-bezier(.2,0,0,1);
    }
    #loginForm::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    #loginForm .login-icon {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #5c7cfa);
      margin: -82px auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      box-shadow: 0 8px 25px var(--accent-glow);
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    #loginForm .login-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: pulse-ring 2s ease-out infinite;
    }
    #loginForm h2 {
      margin: 0 0 4px;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    #loginForm p {
      margin: 0 0 28px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    #loginForm .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    #loginForm .input-group label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    #loginForm .input-wrapper { position: relative; }
    #loginForm .input-wrapper .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #loginForm .input-wrapper:focus-within .input-icon { opacity: 0.7; }
    #loginForm input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      font-size: 0.95rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      box-sizing: border-box;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #loginForm input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    #loginForm input::placeholder { color: var(--text-secondary); opacity: 0.4; }

    #loginForm .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #5c7cfa);
      color: white;
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.3s, opacity 0.3s;
      margin-top: 6px;
      position: relative;
      overflow: hidden;
    }
    #loginForm .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }
    #loginForm .btn-primary:active { transform: translateY(0); }
    #loginForm .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.3s, border-color 0.3s;
      font-family: inherit;
    }
    .btn-google:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--shadow);
      border-color: rgba(128,128,160,0.2);
    }
    .btn-google:active { transform: translateY(0); }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9998;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
    }
    #loadingOverlay.show { display: flex; }
    #loadingOverlay .spinner-lg {
      width: 36px; height: 36px;
      border: 3px solid rgba(128,128,160,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loadingOverlay p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .container {
      max-width: 1100px;
      margin: 14px auto 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2px;
    }

    @media (max-width: 900px) {
      .card { width: calc(50% - 20px); margin: 6px; }
    }
    @media (max-width: 600px) {
      body { padding: 0 10px 80px; }
      .header { padding: 20px 0 6px; }
      .header h1 { font-size: 1.25rem; }
      .card {
        width: 100%; margin: 6px 0;
        border-radius: 16px; padding: 18px 14px 16px;
      }
      .card h3 { font-size: 0.9rem; }
      .card button { padding: 13px 14px; font-size: 13px; }
      .card input[type="color"] { width: 54px; height: 54px; }
      .card .color-picker-wrap { width: 54px; height: 54px; }
      .section-title { font-size: 0.75rem; margin: 20px auto 10px; }
      .bottom-actions { flex-direction: column; align-items: center; gap: 10px; }
      #allOffBtn, #logoutBtn { max-width: 100%; width: 100%; padding: 15px; font-size: 14px; }
      #darkModeBtn { bottom: 14px; right: 14px; padding: 11px 16px; font-size: 11px; }
      .container { margin: 8px auto 0; }
      #loginForm { margin: 36px 12px 16px; padding: 40px 18px 24px; }
      #loginForm .login-icon { width: 56px; height: 56px; margin: -68px auto 16px; font-size: 24px; }
      #loginForm h2 { font-size: 1.2rem; }
      #loginForm input { padding: 12px 12px 12px 38px; font-size: 16px; }
      #loginForm .btn-primary { padding: 13px; font-size: 14px; }
      #toast-container { top: 10px; right: 10px; left: 10px; }
      .toast { max-width: 100%; font-size: 0.85rem; padding: 12px 16px; }
    }
    @media (max-width: 400px) {
      .card { padding: 14px 10px; border-radius: 14px; }
      .card button { font-size: 12px; padding: 12px 10px; }
      .header h1 { font-size: 1.05rem; }
    }
    @media (max-height: 500px) and (orientation: landscape) {
      #loginForm { margin: 12px auto; padding: 22px 20px; }
      #loginForm .login-icon { width: 44px; height: 44px; margin: -52px auto 10px; font-size: 18px; }
      #loginForm h2 { font-size: 0.95rem; }
      #loginForm .input-group { margin-bottom: 10px; }
      #loginForm input { padding: 9px 10px 9px 34px; font-size: 13px; }
      #loginForm .btn-primary { padding: 9px; font-size: 12px; }
    }
    footer {
      font-size: 0.75rem;
      color: var(--text-secondary);
      padding: 14px 0 6px;
      margin-top: 40px;
      opacity: 0.4;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body class="dark-mode">

  <div id="loadingOverlay" class="show">
    <div class="spinner-lg"></div>
    <p>Loading dashboard...</p>
  </div>

  <div id="toast-container"></div>

  <div class="header">
    <h1>ESP32 Smart Home</h1>
    <p class="subtitle">Control Dashboard</p>
    <div class="status-row">
      <span class="status-badge offline" id="connBadge">
        <span class="dot"></span>
        <span id="connText">Connecting...</span>
      </span>
    </div>
  </div>

  <button id="darkModeBtn">☾ Light</button>

  <!-- Login form -->
  <div id="loginForm">
    <div class="login-icon">⚡</div>
    <h2>ESP Control</h2>
    <p>Sign in to access your dashboard</p>
    <div class="input-group">
      <label for="email">Email</label>
      <div class="input-wrapper">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔑</span>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>
    </div>
    <button class="btn-primary" id="loginBtn">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" id="googleBtn">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="section-title">💡 Light</div>
    <div class="container" id="topContainer"></div>

    <div class="section-title">🪟 Window</div>
    <div class="container" id="pushContainer"></div>

    <div class="section-title">🔌 Socket</div>
    <div class="container" id="middleContainer"></div>

    <div class="section-title">🖥️ PC</div>
    <div class="container" id="pulseContainer"></div>

    <div class="section-title">🌈 Light Bar</div>
    <div class="container" id="colorContainer"></div>

    <div class="section-title">💡 Light Bar TV</div>
    <div class="container" id="brightnessContainer"></div>

    <div class="bottom-actions">
      <button id="allOffBtn">All OFF</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <footer>Built by A.GRAMI</footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBP0osYBMwJUUjL9FaKaw-k_omD65g_Q_4",
      authDomain: "esp-32-9e51b.firebaseapp.com",
      databaseURL: "https://esp-32-9e51b-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "esp-32-9e51b",
      storageBucket: "esp-32-9e51b.firebasestorage.app",
      messagingSenderId: "452464470286",
      appId: "1:452464470286:web:dd5de435c39f1856c50f5f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const allowedEmail = "admin@gmail.com";
    const allowedPassword = "admin123";

    const loginForm = document.getElementById("loginForm");
    const dashboard = document.getElementById("dashboard");
    const loginBtn = document.getElementById("loginBtn");
    const googleBtn = document.getElementById("googleBtn");
    const darkModeBtn = document.getElementById("darkModeBtn");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const connBadge = document.getElementById("connBadge");
    const connText = document.getElementById("connText");

    // ---- Toast system ----
    function showToast(message, type, icon) {
      const container = document.getElementById("toast-container");
      const t = document.createElement("div");
      t.className = "toast " + (type || "info");
      t.innerHTML = `<span class="toast-icon">${icon || "•"}</span>${message}`;
      container.appendChild(t);
      setTimeout(() => {
        t.classList.add("removing");
        setTimeout(() => t.remove(), 300);
      }, 3500);
    }

    // ---- Connection status ----
    let hadConnection = false;
    function setConnectionStatus(online) {
      connBadge.className = "status-badge " + (online ? "online" : "offline");
      connText.textContent = online ? "Connected" : "Offline";
      if (online) {
        hadConnection = true;
      } else if (hadConnection) {
        showToast("Connection lost. Changes will sync when reconnected.", "error", "⚠");
      }
    }

    const connectedRef = db.ref(".info/connected");
    connectedRef.on("value", snap => {
      setConnectionStatus(snap.val() === true);
    });

    // ---- Dark mode ----
    darkModeBtn.addEventListener("click", () => {
      document.body.classList.toggle("light-mode");
      darkModeBtn.textContent = document.body.classList.contains("light-mode") ? "☀ Dark" : "☾ Light";
    });

    // ---- Auto-login: check auth state on load ----
    auth.onAuthStateChanged(user => {
      loadingOverlay.classList.remove("show");
      if (user) {
        loginForm.style.display = "none";
        dashboard.style.display = "block";
        startDashboard();
      } else {
        loginForm.style.display = "block";
        dashboard.style.display = "none";
      }
    });

    // Fix the floating promise issue
    if (auth.isSignInWithEmailLink && auth.isSignInWithEmailLink(window.location.href)) {
      // handle email link sign-in if applicable, no-op otherwise
    }

    // ---- Email/password login ----
    loginBtn.addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showToast("Please enter email and password.", "error", "✖");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span>';

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          loginForm.style.display = "none";
          dashboard.style.display = "block";
          startDashboard();
        })
        .catch(error => {
          showToast("Login failed: " + error.message, "error", "✖");
        })
        .finally(() => {
          loginBtn.disabled = false;
          loginBtn.textContent = "Sign In";
        });
    });

    // ---- Google Sign-In ----
    const isFileProtocol = window.location.protocol === "file:";
    if (isFileProtocol) {
      googleBtn.disabled = true;
      googleBtn.style.opacity = "0.4";
      googleBtn.style.cursor = "not-allowed";
      googleBtn.title = "Google sign-in requires a web server (http/https). Use email login instead.";
      googleBtn.addEventListener("click", () => {
        showToast("Google sign-in requires a web server (http/https). Use email login instead.", "error", "⚠");
      });
    } else {
      googleBtn.addEventListener("click", () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        googleBtn.disabled = true;
        googleBtn.innerHTML = '<span class="spinner"></span>';

        auth.signInWithPopup(provider)
          .then(result => {
            loginForm.style.display = "none";
            dashboard.style.display = "block";
            startDashboard();
            showToast("Welcome, " + (result.user.displayName || "User") + "!", "success", "✓");
          })
          .catch(error => {
            if (error.code !== "auth/popup-closed-by-user") {
              showToast("Google sign-in failed: " + error.message, "error", "✖");
            }
          })
          .finally(() => {
            googleBtn.disabled = false;
            googleBtn.innerHTML = `<svg viewBox="0 0 48 48" style="width:20px;height:20px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg> Sign in with Google`;
          });
      });
    }

    // ---- Logout ----
    document.getElementById("logoutBtn").onclick = () => {
      auth.signOut()
        .then(() => {
          dashboard.style.display = "none";
          loginForm.style.display = "block";
          document.getElementById("email").value = "";
          document.getElementById("password").value = "";
        })
        .catch(error => showToast("Logout failed: " + error.message, "error", "✖"));
    };

    // ---- Helpers ----
    function setStatusEl(statusId, on) {
      const el = document.getElementById(statusId);
      const dot = document.getElementById("dot" + statusId);
      if (el) el.innerText = on ? "ON" : "OFF";
      if (dot) dot.className = "dot" + (on ? " on" : "");
    }

    function createCard(title, statusId, btnId, extra) {
      const div = document.createElement("div");
      div.className = "card";
      let html = `<h3>${title}</h3><span class="status"><span class="dot" id="dot${statusId}"></span><span id="${statusId}">Loading...</span></span>`;
      if (btnId) html += `<button id="${btnId}">${extra || "Toggle"}</button>`;
      else if (extra) html += extra;
      div.innerHTML = html;
      return div;
    }

    function hexToRgbStr(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `R${r},G${g},B${b}`;
    }

    function startDashboard() {
      // ---- Top Section: Light ----
      const lightData = [
        { id: 1, path: "relay1", name: "Light" },
      ];
      const topContainer = document.getElementById("topContainer");

      lightData.forEach(r => {
        const statusId = "tStatus" + r.id;
        const btnId = "tBtn" + r.id;
        const card = createCard(r.name, statusId, btnId, "Toggle");
        topContainer.appendChild(card);

        const statusEl = document.getElementById(statusId);
        const btn = document.getElementById(btnId);
        const ref = db.ref("/" + r.path);

        ref.on("value", snap => {
          const v = snap.val();
          setStatusEl(statusId, v);
          btn.style.backgroundColor = v ? "green" : "var(--accent)";
        });

        btn.onclick = () => {
          ref.get().then(snap => ref.set(!snap.val()));
        };
      });

      // ---- Middle Section: Sockets ----
      const socketData = [
        { id: 2, path: "relay2", name: "Socket 1" },
        { id: 3, path: "relay3", name: "Socket 2" },
        { id: 4, path: "relay4", name: "Socket PC" },
        { id: 5, path: "relay5", name: "Socket TV" },
      ];
      const middleContainer = document.getElementById("middleContainer");

      socketData.forEach(r => {
        const statusId = "mStatus" + r.id;
        const btnId = "mBtn" + r.id;
        const card = createCard(r.name, statusId, btnId, "Toggle");
        middleContainer.appendChild(card);

        const statusEl = document.getElementById(statusId);
        const btn = document.getElementById(btnId);
        const ref = db.ref("/" + r.path);

        ref.on("value", snap => {
          const v = snap.val();
          setStatusEl(statusId, v);
          btn.style.backgroundColor = v ? "green" : "var(--accent)";
        });

        btn.onclick = () => {
          ref.get().then(snap => ref.set(!snap.val()));
        };
      });

      // ---- Push Buttons ----
      const pushData = [
        { id: 1, path: "relay6", name: "Up" },
        { id: 2, path: "relay7", name: "Down" },
      ];
      const pushContainer = document.getElementById("pushContainer");

      pushData.forEach(r => {
        const statusId = "pStatus" + r.id;
        const btnId = "pBtn" + r.id;
        const card = createCard(r.name, statusId, btnId, "Hold");
        pushContainer.appendChild(card);

        const statusEl = document.getElementById(statusId);
        const btn = document.getElementById(btnId);
        const ref = db.ref("/" + r.path);

        ref.on("value", snap => {
          const v = snap.val();
          setStatusEl(statusId, v);
          btn.style.backgroundColor = v ? "green" : "var(--accent)";
        });

        const set = (val) => ref.set(val);
        btn.onmousedown = () => set(true);
        btn.onmouseup = () => set(false);
        btn.onmouseleave = () => set(false);
        btn.ontouchstart = (e) => { e.preventDefault(); set(true); };
        btn.ontouchend = (e) => { e.preventDefault(); set(false); };
        btn.ontouchcancel = () => set(false);
      });

      // ---- Pulse Button ----
      const pulseContainer = document.getElementById("pulseContainer");
      const pulseCard = createCard("Power PC", "pulseStatus", "pulseBtn", "ON / OFF");
      pulseContainer.appendChild(pulseCard);

      const pulseStatus = document.getElementById("pulseStatus");
      const pulseBtn = document.getElementById("pulseBtn");
      const pulseRef = db.ref("/relay8");

      pulseRef.on("value", snap => {
        setStatusEl("pulseStatus", snap.val());
        pulseBtn.style.backgroundColor = snap.val() ? "green" : "var(--accent)";
      });

      pulseBtn.onclick = () => {
        pulseRef.set(true);
        setTimeout(() => pulseRef.set(false), 500);
      };

      // ---- Color Pickers ----
      const colorData = [
        { id: 1, path: "color1", name: "Light Bar 1" },
        { id: 2, path: "color2", name: "Light Bar 2" },
      ];
      const colorContainer = document.getElementById("colorContainer");

      colorData.forEach(c => {
        const statusId = "cStatus" + c.id;
        const labelId = "cLabel" + c.id;
        const pickerId = "cPicker" + c.id;
        const toggleBtnId = "cToggle" + c.id;
        let lastColor = "#ff0000";
        const card = createCard(c.name, statusId, null,
          `<input type="color" id="${pickerId}" value="#ff0000" />
           <span class="color-label" id="${labelId}">R255,G0,B0</span>
           <button id="${toggleBtnId}" style="margin-top:10px">Toggle</button>`
        );
        colorContainer.appendChild(card);

        const statusEl = document.getElementById(statusId);
        const picker = document.getElementById(pickerId);
        const label = document.getElementById(labelId);
        const toggleBtn = document.getElementById(toggleBtnId);
        const colorRef = db.ref("/" + c.path);

        function updateStatus(rgb) {
          const isOff = rgb === "R0,G0,B0";
          setStatusEl(statusId, !isOff);
          toggleBtn.style.backgroundColor = isOff ? "var(--accent)" : "green";
        }

        colorRef.on("value", snap => {
          const v = snap.val() || "R0,G0,B0";
          label.innerText = v;
          updateStatus(v);
        });

        picker.addEventListener("input", () => {
          lastColor = picker.value;
          const rgb = hexToRgbStr(picker.value);
          label.innerText = rgb;
          colorRef.set(rgb);
        });

        toggleBtn.onclick = () => {
          colorRef.get().then(snap => {
            const cur = snap.val() || "R0,G0,B0";
            if (cur === "R0,G0,B0") {
              picker.value = lastColor;
              const rgb = hexToRgbStr(lastColor);
              label.innerText = rgb;
              colorRef.set(rgb);
            } else {
              colorRef.set("R0,G0,B0");
              label.innerText = "R0,G0,B0";
            }
          });
        };

        colorRef.once("value", snap => {
          const existing = snap.val();
          if (existing) {
            const parts = existing.match(/R(\d+),G(\d+),B(\d+)/);
            if (parts) {
              const toHex = v => parseInt(v).toString(16).padStart(2, "0");
              const hex = "#" + toHex(parts[1]) + toHex(parts[2]) + toHex(parts[3]);
              picker.value = hex;
              lastColor = hex;
            }
            label.innerText = existing;
            updateStatus(existing);
          } else {
            const rgb = hexToRgbStr(picker.value);
            label.innerText = rgb;
            colorRef.set(rgb);
          }
        });
      });

      // ---- Brightness Slider ----
      const brightnessContainer = document.getElementById("brightnessContainer");
      const brightId = "brightnessSlider";
      const brightValId = "brightVal";
      const brightStatusId = "brightStatus";
      const brightCard = createCard("Light Bar TV", brightStatusId, null,
        `<input type="range" id="${brightId}" min="0" max="100" value="0" />
         <div class="brightness-value" id="${brightValId}">0%</div>`
      );
      brightnessContainer.appendChild(brightCard);

      const brightStatus = document.getElementById(brightStatusId);
      const brightSlider = document.getElementById(brightId);
      const brightVal = document.getElementById(brightValId);
      const brightRef = db.ref("/brightness");

      brightRef.on("value", snap => {
        const v = snap.val();
        const val = v != null ? v : 0;
        brightSlider.value = val;
        brightVal.innerText = val + "%";
        brightStatus.innerText = val + "%";
      });

      brightSlider.addEventListener("input", () => {
        const val = parseInt(brightSlider.value);
        brightVal.innerText = val + "%";
        brightRef.set(val);
      });

      // ---- All OFF ----
      document.getElementById("allOffBtn").onclick = () => {
        [...lightData, ...socketData, ...pushData].forEach(r => {
          db.ref("/" + r.path).set(false);
        });
        db.ref("/relay8").set(false);
        db.ref("/color1").set("R0,G0,B0");
        db.ref("/color2").set("R0,G0,B0");
        db.ref("/brightness").set(0);
        showToast("All devices turned OFF", "success", "✓");
      };
    }
  </script>
</body>
</html>
